name: OpenWrt 25.12 Builder

on:
  workflow_dispatch:

env:
  REPO_URL: immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  OPENWRT_DIR: immortalwrt
  TZ: Asia/Shanghai

jobs:
  OpenWrt_Builder:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86-64

    steps:
      - name: 克隆仓库
        uses: actions/checkout@main

      - name: 当前环境信息
        run: |
          chmod +x scripts/check.sh
          ./scripts/check.sh

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 清理磁盘空间完成
        run: |
          echo "硬盘使用情况:"
          df -hT
          echo "=============================================================================="

      - name: 初始化环境
        run: |
          chmod +x scripts/init-env.sh
          ./scripts/init-env.sh
          sudo timedatectl set-timezone ${{env.TZ}}

      - name: 克隆OpenWrt源码
        run: |
          git clone -b ${{env.OPENWRT_BRANCH}} --single-branch --depth 1 https://github.com/${{env.OPENWRT_REPO}}.git ${{env.OPENWRT_DIR}}

      - name: 复制自定义文件到OpenWrt目录
        run: |
          cp -r x86-64/* ${{env.OPENWRT_DIR}}
          chmod +x ${{env.OPENWRT_DIR}}/files/etc/uci-defaults/*.sh

      - name: 配置OpenWrt Feeds
        run: |
          cd ${{env.OPENWRT_DIR}}
          chmod +x ./init-feeds.sh
          ./init-feeds.sh

      - name: 更新OpenWrt Feeds
        run: |
          cd ${{env.OPENWRT_DIR}}
          ./scripts/feeds update -a

      - name: 安装OpenWrt Feeds
        run: |
          cd ${{env.OPENWRT_DIR}}
          ./scripts/feeds install -a

      - name: 生成默认配置文件
        run: |
          cd ${{env.OPENWRT_DIR}}
          cp default.config .config 
          make defconfig

      - name: 下载依赖包
        id: download
        run: |
          cd ${{env.OPENWRT_DIR}}
          make download -j $(($(nproc)+1)) V=s

      - name: 编译固件
        id: compile
        run: |
          cd ${{env.OPENWRT_DIR}}
          echo -e "$(($(nproc) + 1)) thread compile"
          make -j $(($(nproc)+1)) V=s || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          echo "COMPILE_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV
          echo "COMPILE_TIME=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 清理磁盘空间完成
        run: |
          echo "硬盘使用情况:"
          df -hT
          echo "=============================================================================="

      - name: 组织编译后的固件
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          cd ${{env.OPENWRT_DIR}}
          mkdir -p upload

          cp -rf .config upload/
          mv bin/targets/x86/64/immortalwrt-x86-64-generic-rootfs.tar.gz upload/immortalwrt-x86-64-generic-rootfs-${{env.COMPILE_TIME}}.tar.gz
          mv bin/targets/x86/64/immortalwrt-x86-64-generic-squashfs-combined-efi.img.gz upload/immortalwrt-x86-64-generic-squashfs-combined-efi-${{env.COMPILE_TIME}}.img.gz

      - name: 上传固件到Releases
        if: steps.compile.outputs.status == 'success' && !cancelled()
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{secrets.GITHUB_TOKEN}}
          file_glob: true
          file: upload/*
          tag: ${{env.REPO_BRANCH}}-${{env.COMPILE_DATE}}
          body: |
            # IP
            - immortalwrt: 192.168.10.1
            # username
            - root
            # password
            - password
          overwrite: true

  Delete_Workflow:
    needs: [OpenWrt_Builder]
    runs-on: ubuntu-latest
    steps:
      - name: 删除旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 2
